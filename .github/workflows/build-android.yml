name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      signed:
        description: 'Build signed release APK (requires signing secrets)'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_GITHUB_CLIENT_ID: ${{ vars.GITHUB_CLIENT_ID }}

      - name: Set up release signing
        if: ${{ inputs.signed == 'true' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          cat >> android/gradle.properties << EOF
          RELEASE_STORE_FILE=release.keystore
          RELEASE_KEY_ALIAS=$KEY_ALIAS
          RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD
          RELEASE_KEY_PASSWORD=$KEY_PASSWORD
          EOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK (signed)
        if: ${{ inputs.signed == 'true' }}
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx3g"

      - name: Build debug APK
        if: ${{ inputs.signed != 'true' }}
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx3g"

      - name: Find APK
        id: find_apk
        run: |
          APK=$(find android -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gisthub-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Create GitHub Release (main branch push only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: GistHub v${{ github.run_number }}
          body: |
            ## GistHub Android APK

            Built from commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}

            ### Install
            Download `gisthub-*.apk` below and install on your Android device.
            You may need to enable "Install from unknown sources" in Settings.

            ### Setup
            1. Install the APK
            2. Open GistHub
            3. Sign in with a GitHub Personal Access Token (needs `gist` scope)
            4. Or use GitHub OAuth if `GITHUB_CLIENT_ID` was set during build
          files: ${{ steps.find_apk.outputs.apk_path }}
          draft: false
          prerelease: false
